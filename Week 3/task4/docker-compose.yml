version: '3.8'

services:
  postgres_db:
    image: postgres:16
    container_name: postgres_db_t4
    environment:
      POSTGRES_USER: ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
      POSTGRES_DB: ${DB_NAME:-classicmodels}
    ports:
      # Map container port 5432 to host port 5434 to avoid port collisions on host 5432/5433
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myuser} -d ${DB_NAME:-classicmodels}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      # Mount the classicmodels seed script local to task4
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      # Named volume for Postgres database persistence
      - postgres_data_t4:/var/lib/postgresql/data
    networks:
      - agent_network

  streamlit_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streamlit_app_t4
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-classicmodels}
      - DB_USER=${DB_USER:-myuser}
      - DB_PASSWORD=${DB_PASSWORD:-mypassword}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - LLM_PROVIDER=${LLM_PROVIDER}
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - agent_network

volumes:
  postgres_data_t4:

networks:
  agent_network:
    driver: bridge
