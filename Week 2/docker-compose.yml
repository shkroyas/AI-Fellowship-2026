version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}"
    volumes:
      # Mount the seed.sql script to the initialization directory
      # Any .sql or .sh files in this directory are automatically executed 
      # by the postgres image on its first run.
      - ./app/sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      # Named volume to persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
